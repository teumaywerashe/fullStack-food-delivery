<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
         :root {
            --primary-color: #FF4757;
            /* Vibrant Red/Orange */
            --secondary-color: #2F3542;
            /* Dark Navy */
            --bg-color: #f8f9fa;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .logo-container {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }
        /* The SVG Logo */
        
        #delivery-logo {
            width: 150px;
            height: 150px;
            overflow: visible;
        }
        /* Bowl Body */
        
        .bowl {
            fill: var(--primary-color);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        /* Steam / Speed Lines */
        
        .line {
            stroke: var(--primary-color);
            stroke-width: 6;
            stroke-linecap: round;
            fill: none;
            opacity: 0;
            transition: all 0.3s ease;
        }
        /* Interaction States */
        /* 1. Hover: The Bowl Tilts and Speed Lines Appear */
        
        .logo-container:hover .bowl {
            transform: rotate(-15deg) translateY(-10px);
        }
        
        .logo-container:hover .line {
            opacity: 1;
            stroke-dasharray: 20;
            animation: dash 0.6s linear infinite;
        }
        
        @keyframes dash {
            from {
                stroke-dashoffset: 40;
            }
            to {
                stroke-dashoffset: 0;
            }
        }
        /* 2. Click: The "Delivery Launch" */
        
        .logo-container.launching {
            animation: launch 0.8s forwards ease-in-out;
        }
        
        @keyframes launch {
            0% {
                transform: translateX(0);
                opacity: 1;
            }
            30% {
                transform: translateX(-20px);
            }
            100% {
                transform: translateX(500px);
                opacity: 0;
            }
        }
        /* Text Styling */
        
        .logo-text {
            margin-top: 10px;
            font-size: 24px;
            font-weight: 800;
            color: var(--secondary-color);
            letter-spacing: -1px;
            transition: 0.3s;
        }
        
        .logo-text span {
            color: var(--primary-color);
        }
        
        .logo-container:hover .logo-text {
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

    <div class="logo-container" id="logoApp">
        <svg id="delivery-logo" viewBox="0 0 100 100">
            <!-- Speed Lines (Steam) -->
            <path class="line" d="M20 30 Q 35 10 50 30" />
            <path class="line" d="M40 20 Q 55 0 70 20" />
            
            <!-- The Bowl / Scooter Body -->
            <path class="bowl" d="M10 50 C 10 80, 90 80, 90 50 L 10 50 Z" />
            
            <!-- Steam/Heat Detail -->
            <circle class="bowl" cx="50" cy="45" r="4" />
        </svg>

        <div class="logo-text">Dash<span>Dish</span></div>
    </div>

    <script>
        const logo = document.getElementById('logoApp');

        logo.addEventListener('click', () => {
            logo.classList.add('launching');

            // Reset after animation
            setTimeout(() => {
                logo.classList.remove('launching');
            }, 1500);
        });
    </script>
</body>

</html>
